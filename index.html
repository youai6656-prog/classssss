<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全平台课表导入系统 (iOS/安卓通用)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 420px;
        }
        h1 {
            font-size: 24px;
            color: #1c1c1e;
            margin-top: 0;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="date"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            background-color: #fafafa;
        }
        .upload-area {
            border: 2px dashed #007aff;
            background-color: #f0f8ff;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }
        .upload-area:active { background-color: #e0f0ff; }
        .upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }
        .upload-icon { font-size: 32px; margin-bottom: 10px; }
        .upload-text { color: #007aff; font-weight: 600; font-size: 17px; }
        .tips {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 10px;
            line-height: 1.5;
        }
        #statusArea {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background-color: #f2f2f7;
            font-size: 14px;
            color: #1c1c1e;
            display: none;
        }
        .preview-list {
            text-align: left;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            padding-left: 20px;
            color: #333;
            background: #fff;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #e5e5ea;
        }
        .preview-list li { margin-bottom: 8px; }
        #generateBtn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        #generateBtn:active { transform: scale(0.98); }
        .android-tip {
            display: none;
            margin-top: 15px;
            font-size: 13px;
            color: #ff9500;
            background: #fff5e5;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>全平台一键导入日历</h1>
    
    <div class="form-group">
        <label for="semesterStart">第一周的星期一是哪天？</label>
        <input type="date" id="semesterStart" value="2026-03-02">
    </div>

    <div class="upload-area">
        <div class="upload-icon">📄</div>
        <div class="upload-text">选择或拖拽课表文件</div>
        <div class="tips">支持 Excel/CSV，完美兼容苹果与安卓全系手机</div>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
    </div>
    
    <div id="statusArea"></div>
    <button id="generateBtn">生成日历并导入</button>
    <div id="androidTip" class="android-tip">
        💡 <b>安卓用户提示：</b><br>点击按钮后，浏览器会下载一个 <b>.ics</b> 文件。请在通知栏或下载管理中<b>点击打开该文件</b>，即可将其导入到手机日历中。
    </div>
</div>

<script>
    let parsedEvents = [];
    const statusArea = document.getElementById('statusArea');
    const generateBtn = document.getElementById('generateBtn');
    const androidTip = document.getElementById('androidTip');

    // 检测是否为安卓设备以显示引导提示
    const isAndroid = /Android/i.test(navigator.userAgent);

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        statusArea.style.display = 'block';
        statusArea.innerHTML = "正在运行结构化引擎深度解析...";
        generateBtn.style.display = 'none';
        androidTip.style.display = 'none';

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const grid = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
            
            parsedEvents = autoExtractEvents(grid);
            
            if(parsedEvents.length > 0) {
                let previewHtml = `✅ <b>解析大成功！共识别 ${parsedEvents.length} 门课：</b><ul class="preview-list">`;
                parsedEvents.forEach(evt => {
                    let wDisp = evt.weeks.length > 3 ? `${evt.weeks[0]}...${evt.weeks[evt.weeks.length-1]}` : evt.weeks.join(',');
                    previewHtml += `<li><b>${evt.name}</b> (${evt.teacher || '无教师'})<br><span style="color:#666">第 ${wDisp} 周 | ${evt.location}</span></li>`;
                });
                previewHtml += `</ul>`;
                statusArea.innerHTML = previewHtml;
                generateBtn.style.display = 'block';
                if (isAndroid) androidTip.style.display = 'block'; // 安卓设备显示操作指南
            } else {
                statusArea.innerHTML = `❌ <b>解析失败</b><br>未找到有效的课程数据。`;
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function parseWeeks(text) {
        let weeks = [];
        const weekPattern = /([0-9][0-9,\-~—–]*)\s*(?:周|\(\[周\]\)|\[周\]|\(周\))(?:\s*[(（]?(单|双|单周|双周)?[)）]?)?/;
        const match = text.match(weekPattern);

        if (match) {
            const numStr = match[1];
            const type = match[2] || "";
            const parts = numStr.split(',');
            parts.forEach(part => {
                if (part.match(/[-~—–]/)) {
                    const range = part.split(/[-~—–]/);
                    if(range.length >= 2) {
                        let s = parseInt(range[0]), e = parseInt(range[1]);
                        for(let i = s; i <= e; i++) {
                            if (type.includes("单") && i % 2 === 0) continue;
                            if (type.includes("双") && i % 2 !== 0) continue;
                            weeks.push(i);
                        }
                    }
                } else {
                    let w = parseInt(part);
                    if (!isNaN(w)) weeks.push(w);
                }
            });
        }
        
        if (weeks.length === 0) {
            for(let i=1; i<=16; i++) weeks.push(i);
        }
        
        return [...new Set(weeks)].sort((a,b)=>a-b);
    }

    function autoExtractEvents(grid) {
        let events = [];
        let dayCols = {};
        let timeRows = {};
        const dayMap = {"一":0, "二":1, "三":2, "四":3, "五":4, "六":5, "日":6, "天":6};

        for(let r = 0; r < grid.length; r++) {
            for(let c = 0; c < grid[r].length; c++) {
                let cell = String(grid[r][c]).trim();
                if(!cell) continue;
                let dayMatch = cell.match(/(?:星期|周)(一|二|三|四|五|六|日|天)/);
                if(dayMatch && !dayCols[c] && cell.length < 10) dayCols[c] = dayMap[dayMatch[1]];
                let timeMatch = cell.match(/(\d{1,2}:\d{2})\s*(?:-|~|—)\s*(\d{1,2}:\d{2})/);
                if(timeMatch && !timeRows[r]) {
                    timeRows[r] = { start: timeMatch[1].padStart(5, '0'), end: timeMatch[2].padStart(5, '0') };
                }
            }
        }

        const isMatrix = Object.keys(dayCols).length >= 3 && Object.keys(timeRows).length >= 3;

        if (isMatrix) {
            for(let r in timeRows) {
                for(let c in dayCols) {
                    let cell = String(grid[r][c]).trim();
                    if(!cell || cell.match(/^(星期|周)/) || cell.match(/^\d{1,2}:\d{2}/)) continue;

                    let courses = cell.split(/\n\s*\n|---+/); 
                    courses.forEach(courseStr => {
                        let lines = courseStr.split('\n').map(s=>s.trim()).filter(s=>s);
                        if(lines.length < 1) return;

                        let weekIndex = -1;
                        let weeks = [];
                        const pattern = /([0-9][0-9,\-~—–]*)\s*(?:周|\(\[周\]\)|\[周\]|\(周\))/;
                        
                        for(let i=0; i<lines.length; i++) {
                            if(pattern.test(lines[i])) {
                                weekIndex = i;
                                weeks = parseWeeks(lines[i]);
                                break;
                            }
                        }

                        let name = lines[0];
                        let teacher = "";
                        let loc = "";

                        if (weekIndex !== -1) {
                            if (weekIndex >= 2) {
                                name = lines.slice(0, weekIndex - 1).join(" ");
                                teacher = lines[weekIndex - 1]; 
                            } else if (weekIndex === 1) {
                                name = lines[0];
                            }
                            if (weekIndex + 1 < lines.length) {
                                loc = lines.slice(weekIndex + 1).join(" "); 
                            }
                        } else {
                            name = lines[0];
                            weeks = parseWeeks(courseStr); 
                        }

                        events.push({ 
                            name, 
                            dayOffset: dayCols[c], 
                            startTime: timeRows[r].start, 
                            endTime: timeRows[r].end, 
                            weeks, 
                            teacher, 
                            location: loc 
                        });
                    });
                }
            }
        }
        return events;
    }

    function formatIcsTime(date, timeStr) {
        const [hour, minute] = timeStr.split(':');
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        // 返回纯时间字符串，交由日历生成时绑定绝对时区
        return `${yyyy}${mm}${dd}T${hour}${minute}00`;
    }

    function generateUID() {
        return 'xxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g, c => {
            let r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        }) + "@crossplatform.schedule.app";
    }

    generateBtn.addEventListener('click', function() {
        const baseDateStr = document.getElementById('semesterStart').value;
        const parts = baseDateStr.split('-');
        const baseDate = new Date(parts[0], parts[1] - 1, parts[2]); 

        // 核心改动 1：在 ICS 头部强行注入 Asia/Shanghai 时区定义
        let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Smart Class Schedule CrossPlatform//CN\nCALSCALE:GREGORIAN\n";
        ics += "BEGIN:VTIMEZONE\nTZID:Asia/Shanghai\nX-LIC-LOCATION:Asia/Shanghai\nBEGIN:STANDARD\nTZOFFSETFROM:+0800\nTZOFFSETTO:+0800\nTZNAME:CST\nDTSTART:19700101T000000\nEND:STANDARD\nEND:VTIMEZONE\n";

        parsedEvents.forEach(evt => {
            const baseUID = generateUID();
            
            evt.weeks.forEach(w => {
                const classDate = new Date(baseDate.getTime());
                classDate.setDate(classDate.getDate() + (w - 1) * 7 + evt.dayOffset);

                const dtStart = formatIcsTime(classDate, evt.startTime);
                const dtEnd = formatIcsTime(classDate, evt.endTime);

                ics += "BEGIN:VEVENT\n";
                ics += `UID:${w}-${baseUID}\n`;
                ics += `SUMMARY:${evt.name}\n`;
                
                // 核心改动 2：将所有课程的开始和结束时间死死绑定在 Asia/Shanghai
                ics += `DTSTART;TZID=Asia/Shanghai:${dtStart}\n`;
                ics += `DTEND;TZID=Asia/Shanghai:${dtEnd}\n`;
                
                if(evt.location) ics += `LOCATION:${evt.location}\n`;
                if(evt.teacher) ics += `DESCRIPTION:教师：${evt.teacher}\\n进度：当前是第 ${w} 周\n`;
                ics += "END:VEVENT\n";
            });
        });

        ics += "END:VCALENDAR";

        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.setAttribute('download', 'ClassSchedule.ics');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
